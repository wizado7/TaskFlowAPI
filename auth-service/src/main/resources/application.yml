server:
  port: ${AUTH_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://auth-db:5432/auth_db}
    username: ${AUTH_DB_USER:auth}
    password: ${AUTH_DB_PASSWORD:auth}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET:change-me}
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
            scope: openid,profile,email

app:
  frontend:
    oauth-success-url: ${FRONTEND_OAUTH_SUCCESS_URL:http://localhost:3000/auth/callback}
  jwt:
    secret: ${JWT_SECRET:change-me}
    issuer: task-tracker
    expiration-minutes: ${JWT_EXP_MINUTES:60}
    refresh-expiration-days: ${JWT_REFRESH_DAYS:14}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
