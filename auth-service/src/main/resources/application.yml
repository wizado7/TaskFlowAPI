server:
  port: ${AUTH_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://auth-db:5432/auth_db}
    username: ${AUTH_DB_USER:auth}
    password: ${AUTH_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET}
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
            scope: openid,profile,email

app:
  security:
    public-api-docs-enabled: false
    public-registration-enabled: ${PUBLIC_REGISTRATION_ENABLED:true}
    auth-rate-limit:
      enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
      max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:20}
      window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
      block-seconds: ${AUTH_RATE_LIMIT_BLOCK_SECONDS:900}
  internal-api:
    token: ${INTERNAL_API_TOKEN}
  frontend:
    oauth-success-url: ${FRONTEND_OAUTH_SUCCESS_URL:http://localhost:3000/auth/callback}
  jwt:
    secret: ${JWT_SECRET}
    issuer: task-tracker
    expiration-minutes: ${JWT_EXP_MINUTES:60}
    refresh-expiration-days: ${JWT_REFRESH_DAYS:14}

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
