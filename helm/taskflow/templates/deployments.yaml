{{- range $key, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  labels:
    {{- include "taskflow.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $svc.name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $svc.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: {{ $svc.name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $svc.name }}
          image: {{ include "taskflow.image" (list $ $svc.image) | quote }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: {{ include "taskflow.configName" $ }}
            - secretRef:
                name: {{ include "taskflow.secretName" $ }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: {{ ternary 20 30 (eq $svc.name "api-gateway") }}
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: {{ ternary 40 60 (eq $svc.name "api-gateway") }}
            periodSeconds: 20
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{ if $svc.persistence }}
            {{ range $volume := $svc.persistence }}
            - name: {{ $volume.name }}
              mountPath: {{ $volume.mountPath }}
            {{ end }}
          {{ end }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{ if $svc.persistence }}
        {{ range $volume := $svc.persistence }}
        - name: {{ $volume.name }}
          persistentVolumeClaim:
            claimName: {{ $volume.name }}-pvc
        {{ end }}
      {{ end }}
{{- if $svc.persistence }}
{{- range $volume := $svc.persistence }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $volume.name }}-pvc
  labels:
    {{- include "taskflow.labels" $ | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if $.Values.global.storageClassName }}
  storageClassName: {{ $.Values.global.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ $volume.size | quote }}
{{- end }}
{{- end }}
{{- end }}
