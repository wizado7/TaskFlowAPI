apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: user-service
          image: user-service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: task-tracker-config
            - secretRef:
                name: task-tracker-secrets
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: user-avatars
              mountPath: /data/user-avatars
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
      volumes:
        - name: tmp
          emptyDir: {}
        - name: user-avatars
          persistentVolumeClaim:
            claimName: user-avatars-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-avatars-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 8082
      targetPort: http
  type: ClusterIP
