apiVersion: v1
kind: ConfigMap
metadata:
  name: task-tracker-config

data:
  AUTH_DB_URL: jdbc:postgresql://auth-db:5432/auth_db
  AUTH_DB_USER: auth
  USER_DB_URL: jdbc:postgresql://user-db:5432/user_db
  USER_DB_USER: user
  TASK_DB_URL: jdbc:postgresql://task-db:5432/task_db
  TASK_DB_USER: task
  CLIENT_DB_URL: jdbc:postgresql://client-db:5432/client_db
  CLIENT_DB_USER: client
  GATEWAY_PORT: "8080"
  AUTH_PORT: "8081"
  USER_PORT: "8082"
  TASK_PORT: "8083"
  CLIENT_PORT: "8084"
