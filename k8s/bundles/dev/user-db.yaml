apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-db
  labels:
    app: user-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-db
  template:
    metadata:
      labels:
        app: user-db
    spec:
      containers:
        - name: user-db
          image: postgres:16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: user_db
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: task-tracker-config
                  key: USER_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-tracker-secrets
                  key: USER_DB_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user", "-d", "user_db"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: user-db-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: user-db-data
          persistentVolumeClaim:
            claimName: user-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: user-db
  labels:
    app: user-db
spec:
  selector:
    app: user-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
