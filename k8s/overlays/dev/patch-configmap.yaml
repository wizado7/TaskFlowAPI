apiVersion: v1
kind: ConfigMap
metadata:
  name: task-tracker-config
data:
  SPRING_PROFILES_ACTIVE: dev
  GOOGLE_REDIRECT_URI: https://api-dev.example.com/login/oauth2/code/google
  FRONTEND_OAUTH_SUCCESS_URL: https://app-dev.example.com/auth/callback
  OAUTH_LOGIN_CODE_TTL_SECONDS: "300"
  OAUTH_LOGIN_CODE_CLEANUP_DELAY_MS: "300000"
  OAUTH_LOGIN_CODE_CLEANUP_INITIAL_DELAY_MS: "60000"
  WEBSOCKET_ALLOWED_ORIGIN_PATTERNS: https://app-dev.example.com,http://localhost:3000,http://localhost:5173
  PUBLIC_REGISTRATION_ENABLED: "true"
  AUTH_RATE_LIMIT_MAX_ATTEMPTS: "60"
  AUTH_RATE_LIMIT_BLOCK_SECONDS: "300"
