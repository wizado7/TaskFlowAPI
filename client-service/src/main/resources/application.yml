server:
  port: ${CLIENT_PORT:8084}

spring:
  application:
    name: client-service
  datasource:
    url: ${CLIENT_DB_URL:jdbc:postgresql://client-db:5432/client_db}
    username: ${CLIENT_DB_USER:client}
    password: ${CLIENT_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET}

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

app:
  security:
    public-api-docs-enabled: false
  task-service:
    url: ${TASK_SERVICE_URL:http://task-service:8083}
  client-attachments:
    dir: ${CLIENT_ATTACHMENTS_DIR:uploads/client-attachments}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
