server:
  port: ${TASK_PORT:8083}

spring:
  application:
    name: task-service
  datasource:
    url: ${TASK_DB_URL:jdbc:postgresql://task-db:5432/task_db}
    username: ${TASK_DB_USER:task}
    password: ${TASK_DB_PASSWORD:task}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 1000MB
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET:change-me}

app:
  task-attachments:
    dir: ${TASK_ATTACHMENTS_DIR:uploads/task-attachments}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
